  liitteet:
    '#title': Attachments
  attachments_info:
    '#markup': '<p>All the attachments listed in the call for applications must be submitted for the processing of the grant application. The grant application may be rejected if the attachments are not submitted. If any of the attachments is missing, let us know in the Further clarification on attachments section of the application.</p><h4>Required attachments</h4><p>If the applicant has not previously applied for any grants from the City of Helsinki or if any of the relevant information has changed, the following documents must be submitted:</p>><ul><li>Statutes of the organisation</li><li>A notice from the bank on the account holder or a copy of a bank statement (the applicant must have its own Finnish bank account into which the grant will be paid)</li><li>An extract from the Register of Associations/Foundations</li><li>Financial statements and annual report (last confirmed)</li><li>Action plan and budget for the grant year</li></ul><p>When applying for a grant for multiple years, budgets for the coming years must be attached under the Other attachment section. The budgets can be submitted as a single file.</p><p>In the Other attachment section, the application can also be supplemented with, for example, a freely formatted project plan if attaching such a document is essential to complement the information provided in the application.</p><h4>Attachments previously submitted to the City of Helsinki</h4><p>If the required attachments have already been submitted as attachments to another grant application addressed to the City of Helsinki, the same attachments do not need to be submitted again. The confirmed financial statements, annual report, action plan and budget of the community cannot be different from one application to another.</p>'
  notification_attachments:
    '#markup': '<div class="hds-notification hds-notification--info"><div class="hds-notification__content"><div class="hds-notification__label"><span>The contents of the attachments cannot be viewed afterwards</span></div><div class="hds-notification__body"><p>Please note that you will not be able to open the attachments after you have attached them to the form. You will only see the file name of the attachment.</p><p>Although you cannot view the attachments afterwards, the attachments to the form are sent along with the other information on the form to the grant application processor.</p></div></div></div>'
  extra_info:
