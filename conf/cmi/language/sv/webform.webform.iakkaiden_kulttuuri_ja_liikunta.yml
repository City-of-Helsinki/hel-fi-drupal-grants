  liitteet:
    '#title': Bilagor
  attachments_info:
    '#markup': '<p>Alla bilagor som anges i utlysningen måste lämnas in för behandling av ansökan om understöd. Ansökan om understöd kan avslås om bilagorna inte har lämnats in. Om någon av bilagorna saknas, meddela oss om det i punkten Ytterligare information om bilagor i ansökan.</p><h4>Erforderliga bilagor</h4><p>Om sökanden inte tidigare har ansökt om understöd från Helsingfors stad eller om uppgifterna har ändrats, måste följande bilagor lämnas in:</p><ul><li>samfundets stadgar</li><li>bankens meddelande om kontoinnehavare eller kopia av kontoutdrag (sökanden måste ha ett eget finskt bankkonto där understödet betalas ut)</li><li>utdrag ur förenings-/stiftelseregistret</li><li>bokslut och verksamhetsberättelse (sist bekräftade)</li><li>verksamhetsplan och budget för understödsåret</li></ul><p>När understöd söks för flera år ska budgetar för kommande år bifogas under punkten Övrig bilaga. Budgetarna kan bifogas som en enda fil.</p><p>Under punkten Övrig bilaga kan ansökan även kompletteras med till exempel en fritt formulerad projektplan, om det är väsentligt för att komplettera uppgifterna i ansökan.</p><p>xxxx</p><h4>Bilagor som tidigare lämnats in till Helsingfors stad</h4><p>Om de erforderliga bilagorna redan har lämnats in som bilaga till en annan ansökan om understöd till Helsingfors stad, behöver samma bilagor inte lämnas in igen. Samfundets fastställda bokslut, verksamhetsberättelse, verksamhetsplan och budget får inte vara olika i bilagor till de olika ansökningarna.</p>'
  notification_attachments:
    '#markup': '<div class="hds-notification hds-notification--info"><div class="hds-notification__content"><div class="hds-notification__label"><span>Innehållet i bilagorna kan inte granskas i efterhand</span></div><div class="hds-notification__body"><p>Observera att du inte kan öppna bilagorna efter att du har bifogat dem blanketten. Du ser bara bilagans filnamn.</p><p>Även om du inte kan granska innehållet i bilagorna i efterhand skickas bilagorna som bifogats blanketten med övriga uppgifter till personen som behandlar ansökan om understöd.</p></div></div></div>'
