services:
  _defaults:
    autowire: true
    autoconfigure: true

  logger.channel.helfi_helsinki_profiili:
    parent: logger.channel_base
    arguments: [ 'helfi_helsinki_profiili' ]

  helfi_helsinki_profiili.userdata:
    class: Drupal\helfi_helsinki_profiili\HelsinkiProfiiliUserData
  Drupal\helfi_helsinki_profiili\HelsinkiProfiiliUserData: '@helfi_helsinki_profiili.userdata'

  Drupal\helfi_helsinki_profiili\RegisterPageRedirectMiddleware:
    tags:
      - { name: http_middleware, priority: 1000 }

  Drupal\helfi_helsinki_profiili\EventSubscriber\TokenExpiredExceptionSubscriber: ~

  Drupal\helfi_helsinki_profiili\ProfiiliApiClient: ~
